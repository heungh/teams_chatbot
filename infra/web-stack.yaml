AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Next.js chatbot on ECS Fargate behind ALB, fronted by CloudFront.
  Uses default VPC + public subnets for simplicity (no NAT cost).

Parameters:
  ProjectName:
    Type: String
    Default: teams-bedrock-chatbot
  ImageUri:
    Type: String
    Description: ECR image URI (account.dkr.ecr.region.amazonaws.com/repo:tag)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Default VPC ID
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnet IDs from default VPC (2+ AZs)
  ContainerCpu:
    Type: Number
    Default: 256
    AllowedValues: [256, 512, 1024]
  ContainerMemory:
    Type: Number
    Default: 512
    AllowedValues: [512, 1024, 2048]
  DesiredCount:
    Type: Number
    Default: 1
  ParamPrefix:
    Type: String
    Default: /teams-bedrock-chatbot

Resources:

  # ---------------- CloudWatch Logs ----------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}
      RetentionInDays: 7

  # ---------------- IAM ----------------
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-task-exec
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-ssm-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BedrockKnowledgeBase
                Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*
              - Sid: BedrockModelInvoke
                Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/*
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*
              - Sid: SsmRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParamPrefix}/*
              - Sid: KmsDecryptForSsm
                Effect: Allow
                Action: kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
              - Sid: StsCallerIdentity
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'

  # ---------------- Security Groups ----------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB ingress from internet (CloudFront origin)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet (filtered via CloudFront in front)
      Tags:
        - { Key: Name, Value: !Sub ${ProjectName}-alb-sg }

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS task ingress from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: Next.js port from ALB
      Tags:
        - { Key: Name, Value: !Sub ${ProjectName}-task-sg }

  # ---------------- ALB ----------------
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]
      LoadBalancerAttributes:
        - { Key: idle_timeout.timeout_seconds, Value: '60' }

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tg
      VpcId: !Ref VpcId
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: '200' }
      TargetGroupAttributes:
        - { Key: deregistration_delay.timeout_seconds, Value: '20' }

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---------------- ECS ----------------
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ProjectName
      ClusterSettings:
        - { Name: containerInsights, Value: disabled }

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ProjectName
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: web
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - { Name: NODE_ENV, Value: production }
            - { Name: AWS_REGION, Value: !Ref AWS::Region }
            - { Name: PARAM_PREFIX, Value: !Ref ParamPrefix }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  Service:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: !Sub ${ProjectName}-svc
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups: [!Ref TaskSecurityGroup]
      TaskDefinition: !Ref TaskDefinition
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60

  # ---------------- CloudFront ----------------
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${ProjectName} chatbot distribution
        DefaultRootObject: ''
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: alb-origin
            DomainName: !GetAtt LoadBalancer.DNSName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginReadTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: alb-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed CachingDisabled — dynamic chatbot, no cache
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          # Managed AllViewerExceptHostHeader — forward everything CloudFront can
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

Outputs:
  AlbDnsName:
    Description: ALB DNS (direct, http only)
    Value: !GetAtt LoadBalancer.DNSName
  CloudFrontDomain:
    Description: Public chatbot URL (https)
    Value: !Sub https://${Distribution.DomainName}
  CloudFrontDistributionId:
    Value: !Ref Distribution
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
  LogGroupName:
    Value: !Ref LogGroup
  ServiceName:
    Value: !GetAtt Service.Name
  ClusterName:
    Value: !Ref Cluster
